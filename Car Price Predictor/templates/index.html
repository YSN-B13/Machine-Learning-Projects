<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Predictor</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg glass-card fade-in">
        <div class="card-header text-center border-0 pt-4">
            <h1 class="fw-bold text-primary"><i class="fas fa-car-side"></i> Car Value Estimator</h1>
            <p class="text-muted small">AI-Powered Resale Value Prediction</p>
        </div>
        
        <div class="card-body p-4">
            <form id="prediction-form">
                
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <select class="form-select" id="company" name="company" required onchange="load_car_models(this.id, 'car_models')">
                                <option value="" selected disabled>Select Company</option>
                                {% for company in companies %}
                                <option value="{{ company }}">{{ company }}</option>
                                {% endfor %}
                            </select>
                            <label for="company"><i class="fas fa-building me-1"></i> Company</label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-floating">
                            <select class="form-select" id="car_models" name="car_models" required disabled>
                                <option value="" selected disabled>Select Model</option>
                            </select>
                            <label for="car_models"><i class="fas fa-car me-1"></i> Car Model</label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-floating">
                            <select class="form-select" id="year" name="year" required>
                                <option value="" selected disabled>Select Year</option>
                                {% for year in years %}
                                <option value="{{ year }}">{{ year }}</option>
                                {% endfor %}
                            </select>
                            <label for="year"><i class="fas fa-calendar-alt me-1"></i> Year of Purchase</label>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-floating">
                            <select class="form-select" id="fuel_type" name="fuel_type" required>
                                <option value="" selected disabled>Select Fuel</option>
                                {% for fuel in fuel_types %}
                                <option value="{{ fuel }}">{{ fuel }}</option>
                                {% endfor %}
                            </select>
                            <label for="fuel_type"><i class="fas fa-gas-pump me-1"></i> Fuel Type</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="form-floating">
                            <input type="number" class="form-control" id="kilo_driven" name="kilo_driven" placeholder="ex. 50000" required min="0">
                            <label for="kilo_driven"><i class="fas fa-tachometer-alt me-1"></i> Kilometers Driven</label>
                        </div>
                    </div>

                    <div class="col-12 text-center mt-3">
                        <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm rounded-pill w-100">
                            Predict Price
                        </button>
                    </div>
                </div>
            </form>

            <div class="text-center mt-4" id="result-container" style="display: none;">
                <div class="d-flex justify-content-center">
                    <div id="loading-spinner" class="spinner-border text-primary" role="status" style="display: none;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                <div id="prediction-result" class="alert alert-success mt-3 shadow-sm" style="display: none;">
                    <h4 class="alert-heading mb-0"><span id="prediction-text"></span></h4>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ---------------------------------------------------------
    // 1. Dynamic Model Filtering Logic
    // ---------------------------------------------------------
    function load_car_models(company_id, car_model_id) {
        var company = document.getElementById(company_id);
        var car_model = document.getElementById(car_model_id);
        
        // Reset the model dropdown
        car_model.value = "";
        car_model.innerHTML = '<option value="" selected disabled>Select Model</option>';
        car_model.disabled = false; 

        // Jinja2 Template Injection
        // This loops through the data passed from Flask and generates JS if-statements
        {% for company in companies %}
            if (company.value == "{{ company }}") {
                {% for model in car_models %}
                    // Logic: If the company name is part of the model name (e.g. "Hyundai" in "Hyundai i10")
                    {% if company in model %}
                        var newOption = document.createElement("option");
                        newOption.value = "{{ model }}";
                        newOption.innerHTML = "{{ model }}";
                        car_model.options.add(newOption);
                    {% endif %}
                {% endfor %}
            }
        {% endfor %}
    }

    // ---------------------------------------------------------
    // 2. Form Submission via Fetch API (No Page Reload)
    // ---------------------------------------------------------
    document.getElementById('prediction-form').addEventListener('submit', function(event) {
        event.preventDefault(); // Prevent default HTML form submission

        const resultContainer = document.getElementById('result-container');
        const spinner = document.getElementById('loading-spinner');
        const resultAlert = document.getElementById('prediction-result');
        const predictionText = document.getElementById('prediction-text');
        
        // Reset UI
        resultContainer.style.display = 'block';
        spinner.style.display = 'block';
        resultAlert.style.display = 'none';
        
        const fd = new FormData(this);

        fetch('/predict', {
            method: 'POST',
            body: fd
        })
        .then(response => response.text())
        .then(data => {
            spinner.style.display = 'none';
            resultAlert.style.display = 'block';

            // Check if backend returned an error string
            if(data.includes("Error")) {
                resultAlert.className = "alert alert-danger mt-3 shadow-sm";
                predictionText.innerHTML = data;
            } else {
                // Format currency (Indian Rupee)
                let price = parseFloat(data).toLocaleString('en-IN', {
                    maximumFractionDigits: 0,
                    style: 'currency',
                    currency: 'INR'
                });
                resultAlert.className = "alert alert-success mt-3 shadow-sm";
                predictionText.innerHTML = "Estimated Value: " + price;
            }
        })
        .catch(error => {
            console.error('Error:', error);
            spinner.style.display = 'none';
            resultAlert.style.display = 'block';
            resultAlert.className = "alert alert-danger mt-3 shadow-sm";
            predictionText.innerHTML = "Something went wrong. Please try again.";
        });
    });
</script>
</body>
</html>
